<!DOCTYPE html>
<html>
<head>
    <title>Login - Sala de Aula</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 100px; }
        .box { background: #2d2d2d; padding: 40px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { display: block; margin: 15px auto; padding: 10px; width: 80%; border-radius: 5px; border: none; }
        button { background: #00ff88; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; }
        .erro { color: #ff4444; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #00ff88;">Acesso ao Portal</h2>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <form method="post">
            <input type="text" name="usuario" placeholder="Nome de Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
